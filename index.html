<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Portfolio 2026 - WeiWang</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}

  /* Slide container */
  .slides{position:relative;width:100%;height:100%}
  .slide{
    position:absolute;top:0;left:0;width:100%;height:100%;
    opacity:0;transition:opacity .5s ease;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .slide.active{opacity:1;pointer-events:auto}
  .slide img{
    max-width:100%;max-height:100%;
    object-fit:contain;
    -webkit-user-drag:none;user-select:none;
  }

  /* Click zones for navigation (PC) */
  .nav-zone{
    position:absolute;top:0;height:100%;width:20%;z-index:10;cursor:pointer;
    display:flex;align-items:center;
    opacity:0;transition:opacity .3s;
  }
  .nav-zone:hover{opacity:1}
  .nav-zone.prev{left:0;justify-content:flex-start;padding-left:20px}
  .nav-zone.next{right:0;justify-content:flex-end;padding-right:20px}
  .nav-zone svg{
    width:40px;height:40px;
    filter:drop-shadow(0 1px 4px rgba(0,0,0,.5));
    fill:rgba(255,255,255,.8);
  }

  /* Bottom bar */
  .bottom-bar{
    position:absolute;bottom:0;left:0;right:0;z-index:20;
    display:flex;align-items:center;justify-content:center;
    padding:12px 16px 20px;
    background:linear-gradient(transparent,rgba(0,0,0,.4));
    opacity:0;transition:opacity .3s;
  }
  .slides:hover .bottom-bar,.slides.touch-active .bottom-bar{opacity:1}

  /* Dots */
  .dots{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:80%}
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:rgba(255,255,255,.35);
    cursor:pointer;transition:all .3s;flex-shrink:0;
  }
  .dot.active{background:#fff;transform:scale(1.3)}

  /* Page indicator */
  .page-info{
    position:absolute;bottom:24px;right:20px;z-index:20;
    color:rgba(255,255,255,.6);font-size:13px;
    opacity:0;transition:opacity .3s;
    pointer-events:none;
  }
  .slides:hover .page-info,.slides.touch-active .page-info{opacity:1}

  /* Fullscreen button */
  .fs-btn{
    position:absolute;top:16px;right:16px;z-index:30;
    width:36px;height:36px;border:none;border-radius:8px;
    background:rgba(255,255,255,.15);backdrop-filter:blur(4px);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .3s;
  }
  .slides:hover .fs-btn,.slides.touch-active .fs-btn{opacity:1}
  .fs-btn svg{width:18px;height:18px;fill:rgba(255,255,255,.8)}

  /* Loading spinner */
  .loading{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:32px;height:32px;border:3px solid rgba(255,255,255,.2);
    border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

  /* Mobile adjustments */
  @media(max-width:768px){
    .nav-zone{display:none}
    .dot{width:6px;height:6px}
    .dots{gap:4px}
    .bottom-bar{padding:8px 12px 16px}
    .page-info{bottom:18px;right:14px;font-size:12px}
  }

  /* Preload hint */
  .preload{display:none}
</style>
</head>
<body>
<div class="slides" id="slides">
  <div class="loading" id="loader"></div>

  <!-- Navigation zones -->
  <div class="nav-zone prev" onclick="prev()">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </div>
  <div class="nav-zone next" onclick="next()">
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </div>

  <!-- Fullscreen button -->
  <button class="fs-btn" onclick="toggleFs()" title="全屏">
    <svg viewBox="0 0 24 24" id="fsIcon"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
  </button>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="dots" id="dots"></div>
  </div>
  <div class="page-info" id="pageInfo"></div>
</div>

<script>
const TOTAL = 32;
const container = document.getElementById('slides');
const dotsEl = document.getElementById('dots');
const pageInfoEl = document.getElementById('pageInfo');
const loader = document.getElementById('loader');

let current = 0;
let slides = [];
let loaded = new Set();

// Build slides and dots
for (let i = 0; i < TOTAL; i++) {
  const num = String(i + 1).padStart(3, '0');

  // Slide element
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  const img = document.createElement('img');
  img.alt = 'Slide ' + (i + 1);
  img.dataset.src = 'slides/keynote_slides.' + num + '.jpeg';
  div.appendChild(img);
  container.insertBefore(div, container.querySelector('.nav-zone'));
  slides.push({ el: div, img: img });

  // Dot
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  dotsEl.appendChild(dot);
}

// Load image
function loadSlide(idx) {
  if (idx < 0 || idx >= TOTAL || loaded.has(idx)) return;
  const s = slides[idx];
  s.img.src = s.img.dataset.src;
  loaded.add(idx);
}

// Preload neighbors
function preload(idx) {
  loadSlide(idx);
  loadSlide(idx - 1);
  loadSlide(idx + 1);
  loadSlide(idx + 2);
}

function updateUI() {
  const dots = dotsEl.children;
  for (let i = 0; i < TOTAL; i++) {
    slides[i].el.classList.toggle('active', i === current);
    dots[i].classList.toggle('active', i === current);
  }
  pageInfoEl.textContent = (current + 1) + ' / ' + TOTAL;
}

function goTo(idx) {
  if (idx < 0 || idx >= TOTAL) return;
  current = idx;
  preload(current);
  updateUI();
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
  else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
  else if (e.key === 'End') { e.preventDefault(); goTo(TOTAL - 1); }
  else if (e.key === 'f' || e.key === 'F') { toggleFs(); }
});

// Touch/swipe support
let touchStartX = 0, touchStartY = 0, touchStartTime = 0, swiping = false;
container.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartTime = Date.now();
  swiping = true;
  container.classList.add('touch-active');
  clearTimeout(container._hideTimer);
}, { passive: true });

container.addEventListener('touchmove', e => {
  // Prevent scroll
}, { passive: true });

container.addEventListener('touchend', e => {
  if (!swiping) return;
  swiping = false;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) && dt < 500) {
    dx < 0 ? next() : prev();
  }
  container._hideTimer = setTimeout(() => container.classList.remove('touch-active'), 3000);
});

// Mouse click on slide to toggle bottom bar on mobile
container.addEventListener('click', e => {
  if (e.target.closest('.nav-zone,.fs-btn,.dots,.dot')) return;
  if (window.innerWidth <= 768) {
    container.classList.toggle('touch-active');
    clearTimeout(container._hideTimer);
    if (container.classList.contains('touch-active')) {
      container._hideTimer = setTimeout(() => container.classList.remove('touch-active'), 3000);
    }
  }
});

// Fullscreen
function toggleFs() {
  if (!document.fullscreenElement) {
    (container.requestFullscreen || container.webkitRequestFullscreen || container.msRequestFullscreen).call(container);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
  }
}

// Mouse wheel
container.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.deltaY > 0 || e.deltaX > 0) next();
  else prev();
}, { passive: false });

// Debounce wheel
let wheelTimer = null;
container.removeEventListener('wheel', arguments);
container.addEventListener('wheel', e => {
  e.preventDefault();
  if (wheelTimer) return;
  wheelTimer = setTimeout(() => wheelTimer = null, 300);
  if (e.deltaY > 0 || e.deltaX > 0) next();
  else prev();
}, { passive: false });

// Init
preload(0);
slides[0].img.onload = () => { loader.style.display = 'none'; };
setTimeout(() => loader.style.display = 'none', 3000); // fallback hide
updateUI();
</script>
</body>
</html>
